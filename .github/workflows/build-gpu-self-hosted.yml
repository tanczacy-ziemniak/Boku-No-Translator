name: Build GPU Release (self-hosted)

on:
  workflow_dispatch:
    inputs:
      paddle_gpu_runtime:
        description: "Paddle GPU runtime to package"
        required: true
        default: "cuda126"
        type: choice
        options:
          - cuda118
          - cuda126
          - cuda129
      llama_cuda_install_mode:
        description: "llama-cpp-python CUDA install mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - wheel
          - source

permissions:
  contents: read

jobs:
  build-gpu:
    name: Build Windows GPU package
    runs-on:
      - self-hosted
      - Windows
      - X64
      - nvidia-gpu
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build packaged app
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          .\build_app.ps1 `
            -PaddleGpuRuntime "${{ inputs.paddle_gpu_runtime }}" `
            -LlamaCudaInstallMode "${{ inputs.llama_cuda_install_mode }}" `
            -RequireLlamaCuda

      - name: Create GPU archive
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $runtime = "${{ inputs.paddle_gpu_runtime }}"
          $zipPath = "boku-no-translator-windows-$runtime.zip"
          Compress-Archive -Path "dist\boku-no-translator" -DestinationPath $zipPath -Force
          Get-FileHash -Algorithm SHA256 -LiteralPath $zipPath |
            ForEach-Object { "$($_.Hash)  $zipPath" } |
            Set-Content -LiteralPath "$zipPath.sha256" -Encoding ASCII
          "BOKU_GPU_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BOKU_GPU_SHA=$zipPath.sha256" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: boku-no-translator-windows-${{ inputs.paddle_gpu_runtime }}
          path: |
            ${{ env.BOKU_GPU_ZIP }}
            ${{ env.BOKU_GPU_SHA }}
